<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="i-blur-xl" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="46"/>
    </filter>
    <filter id="i-blur-md" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Base: near-black deep indigo -->
  <rect width="1200" height="450" fill="#06080f"/>

  <!-- Dominant indigo pool — lower right (server room ambient) -->
  <ellipse cx="1110" cy="410" rx="500" ry="330" fill="#182c62" opacity="0.64" filter="url(#i-blur-xl)"/>
  <ellipse cx="990"  cy="355" rx="270" ry="185" fill="#243a78" opacity="0.30" filter="url(#i-blur-xl)"/>

  <!-- Purple-violet accent — upper left (secondary light source) -->
  <ellipse cx="130" cy="70"  rx="340" ry="250" fill="#2e2248" opacity="0.40" filter="url(#i-blur-xl)"/>
  <ellipse cx="220" cy="130" rx="160" ry="110" fill="#3c2a5c" opacity="0.18" filter="url(#i-blur-md)"/>

  <!-- Cool mid-centre depth -->
  <ellipse cx="580" cy="230" rx="300" ry="165" fill="#162044" opacity="0.16" filter="url(#i-blur-xl)"/>

  <!-- Server rack horizontal bands — equipment rows -->
  <rect x="0" y="148" width="1200" height="1" fill="#f5f1ea" opacity="0.030"/>
  <rect x="0" y="300" width="1200" height="1" fill="#f5f1ea" opacity="0.025"/>
</svg>
